<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kildare U20 — AD Performance Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1929;color:#fff;font-family:Inter,Arial,sans-serif;min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0b1929}::-webkit-scrollbar-thumb{background:#1e3a52;border-radius:3px}
table{border-collapse:collapse;width:100%}
th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#557;border-bottom:1px solid #1e3a52;padding:8px 12px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
td{padding:8px 12px;font-size:12px;vertical-align:middle}
tr:not(:last-child) td{border-bottom:1px solid #0f2a3e22}
tr:hover td{background:#0f2a3e55}
button{font-family:inherit;cursor:pointer}
select{font-family:inherit;background:#0f2235;border:1px solid #1e3a52;color:#9FE1CB;padding:4px 10px;border-radius:3px;font-size:10px;cursor:pointer;appearance:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #1e3a52;border-top:2px solid #9FE1CB;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#tabs-nav button{padding:12px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:#446;font-size:12px;font-weight:400;letter-spacing:.04em;transition:all .15s}
#tabs-nav button.active{color:#9FE1CB;border-bottom-color:#9FE1CB;font-weight:700}
.pos-btn,.sub-btn,.metric-btn,.tl-btn{padding:4px 10px;border-radius:3px;font-size:10px;font-weight:600;background:transparent;border:1px solid #1e3a52;color:#446;transition:all .15s;cursor:pointer}
.pos-btn.active,.sub-btn.active,.metric-btn.active,.tl-btn.active{background:#9FE1CB22;border-color:#9FE1CB;color:#9FE1CB}
.mode-btn{padding:7px 18px;border-radius:4px;font-size:11px;font-weight:700;background:transparent;border:1px solid #1e3a52;color:#446;letter-spacing:.04em;transition:all .15s;cursor:pointer}
.mode-btn.active{background:#1e3a5244;border-color:#9FE1CB;color:#9FE1CB}
.card{flex:1;background:#0f2235;border-radius:6px;padding:10px 14px;border-top:2px solid #1e3a52}
.card .label{font-size:9px;color:#557;text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.card .value{font-size:20px;font-weight:700;color:#fff;line-height:1.1}
.card .sub{font-size:9px;color:#446;margin-top:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;white-space:nowrap}
.avail-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.setup-box{background:#0f2235;border-radius:8px;padding:32px;text-align:center;border:1px dashed #1e3a52}
th[title]{cursor:help;border-bottom:1px dashed #446}
</style>
</head>
<body>
<div style="background:#0c1f32;border-bottom:1px solid #1e3a52;padding:14px 24px;display:flex;align-items:center;justify-content:space-between">
  <div>
    <div style="font-size:10px;color:#9FE1CB;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px" id="team-name"></div>
    <div style="font-size:18px;font-weight:700;letter-spacing:-.02em">Athletic Development · Performance Dashboard</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:9px;color:#557;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Next Match</div>
    <div style="font-size:12px;color:#9FE1CB;font-weight:700" id="next-match"></div>
  </div>
</div>
<div id="data-status-bar" style="background:#0b1929;border-bottom:1px solid #1e3a52;padding:5px 24px;display:flex;gap:16px;align-items:center;font-size:9px;flex-wrap:wrap">
  <span style="color:#334">Data:</span>
  <span id="ds-squad" style="color:#334">LS_Squad_Load …</span>
  <span id="ds-intensity" style="color:#334">LS_Player_Intensity …</span>
  <span id="ds-drill" style="color:#334">LS_Drill_Data …</span>
  <span id="ds-trend" style="color:#334">LS_Load_Trend …</span>
  <span id="ds-daily" style="color:#334">LS_Daily_Export …</span>
  <span id="ds-ext" style="color:#334">Ext Activity …</span>
  <span id="ds-schedule" style="color:#334">Match Schedule …</span>
</div>
<div id="tabs-nav" style="background:#0c1f32;border-bottom:1px solid #1e3a52;padding:0 24px;display:flex">
  <button class="active" data-tab="squad">👥 Squad Status</button>
  <button data-tab="load">📈 Load Monitoring</button>
  <button data-tab="intensity">⚡ Intensity &amp; Zones</button>
  <button data-tab="match">📊 Match Exposure</button>
  <button data-tab="profile">👤 Player Profile</button>
</div>
<div style="padding:24px" id="tab-content">
  <div style="color:#9FE1CB;padding:40px 0;text-align:center"><span class="spinner"></span>Loading dashboard data…</div>
</div>
<div style="padding:10px 24px;border-top:1px solid #0f2a3e;font-size:9px;color:#223">
  Kildare GAA U20 Football · Athletic Development · gpexe · 2026 · Live data: Google Sheets
</div>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const CFG={
  SQUAD_LOAD_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=2100000004&single=true&output=csv',
  PLAYER_INTENSITY_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=1529021756&single=true&output=csv',
  DRILL_DATA_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=215121705&single=true&output=csv',
  LOAD_TREND_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=2100000006&single=true&output=csv',
  DAILY_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=2100000012&single=true&output=csv',
  EXT_ACTIVITY_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=1093848037&single=true&output=csv',
  MATCH_SCHEDULE_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaiT2EXrwkobUINl0zCLTAa7G7vZy6J3AGgOEJubAAD8zaqEfv7XgPgF_lF7toYi0am6IKWFkAjEX4/pub?gid=2100000002&single=true&output=csv',
  NEXT_MATCH:'',
  TEAM:'Kildare GAA · U20 Football · 2026',
};
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const PCOL={'Middle 8':'#4FC3F7','Inside Forward':'#81C784','Inside Defender':'#FFB74D'};
const FCFG={'High Risk':{bg:'#E24B4A22',color:'#E24B4A',border:'#E24B4A44'},'Monitor':{bg:'#FF8C0022',color:'#FF8C00',border:'#FF8C0044'},'Normal':{bg:'#4CAF5022',color:'#4CAF50',border:'#4CAF5044'},'Under-Loaded':{bg:'#4FC3F722',color:'#4FC3F7',border:'#4FC3F744'}};
const ACFG={Available:'#4CAF50',RTP:'#FF8C00',Injured:'#E24B4A',Unavailable:'#9E9E9E','No GPS':'#9E9E9E'};
const U20_M=125,U20_H=25,SNR_M=150,SNR_H=41;
const SCW=900,SCH=380,SPL=56,SPR=20,SPT=20,SPB=48;
const SPW=SCW-SPL-SPR,SPH=SCH-SPT-SPB;
const XN=60,XX=170,YN=0,YX=48;
const sx=v=>SPL+((v-XN)/(XX-XN))*SPW;
const sy=v=>SPT+SPH-((v-YN)/(YX-YN))*SPH;
const SPD_COLS=['Max_Speed','Session_Max_Speed','Peak_Speed','Top_Speed','Max_Velocity','Maximum_Velocity','Max_Vel'];
const ACC_COLS=['Max_Acc','Max_Acc_ms2','Peak_Acc','Max_Acceleration','Maximum_Acceleration','Max_Acc_Load','Max Acc Load','Peak_Acceleration','Max_Accel','Peak_Accel'];
const DEC_COLS=['Max_Dec','Max_Dec_ms2','Peak_Dec','Max_Deceleration','Maximum_Deceleration','Max_Dec_Load','Max Dec Load','Peak_Deceleration','Max_Decel','Peak_Decel'];
// Auto-detect m/s → km/h: GPS units sometimes export max speed in m/s (typical range 5–12)
// A value < 15 is almost certainly m/s; multiply by 3.6 to convert to km/h
function spdKph(v){return(v>0&&v<15)?+(v*3.6).toFixed(1):v;}
// ── METRICS (multi-column fallbacks for weekly sheets) ────────────────────────
const METRICS={
  hmld:{label:'HMLD',weekCols:['Weekly_HMLD','Weekly HMLD','HMLD_Weekly'],acwrCols:['HMLD_ACWR','HMLD ACWR'],unit:'m',dailyCol:'HMLD',color:'#9FE1CB'},
  td:{label:'Total Distance',weekCols:['Weekly_TD','Weekly_Total_Distance','Weekly Total Distance','Total_Distance_Weekly','TD_Weekly'],acwrCols:['TD_ACWR','TD ACWR','Total_Distance_ACWR'],unit:'m',dailyCol:'Total_Distance',color:'#4FC3F7'},
  hsr:{label:'HSR',weekCols:['Weekly_HSR','Weekly HSR','HSR_Weekly'],acwrCols:['HSR_ACWR','HSR ACWR'],unit:'m',dailyCol:'HSR',color:'#81C784'},
  acc:{label:'Acc Events',weekCols:['Weekly_Acc_Events','Weekly Acc Events','Acc_Events_Weekly','Weekly_Acc'],acwrCols:['Acc_Events_ACWR','Acc ACWR','Acc_ACWR'],unit:'',dailyCol:'Acc_Events',color:'#FFB74D'},
  dec:{label:'Dec Events',weekCols:['Weekly_Dec_Events','Weekly Dec Events','Dec_Events_Weekly','Weekly_Dec'],acwrCols:['Dec_Events_ACWR','Dec ACWR','Dec_ACWR'],unit:'',dailyCol:'Dec_Events',color:'#FF8A65'},
};
// ── STATE ─────────────────────────────────────────────────────────────────────
const DATA={squad:null,intensity:null,drill:null,trend:null,daily:null,ext:null,schedule:null};
const STATE={
  tab:'squad',squadPos:'All',squadSort:'hmld',squadDir:'desc',
  loadMetric:'hmld',loadPlayer:'All',
  intPos:'All',intMatch:'All',intMode:'match',intHalf:'full',intDrill:undefined,intLastN:'All',
  matchPos:'All',
  profilePlayer:'',profileTimeline:'28d',
  profMode:'match',profHalf:'full',profMatch:'All',
};
// ── CSV ───────────────────────────────────────────────────────────────────────
function parseLine(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;}
function parseCSV(txt){try{const lines=txt.trim().split('\n');if(lines.length<2)return null;const hdrs=parseLine(lines[0]);const rows=lines.slice(1).map(l=>{const v=parseLine(l),o={};hdrs.forEach((h,i)=>{o[h]=v[i]||'';});return o;}).filter(r=>Object.values(r).some(v=>v!==''));return{headers:hdrs,rows};}catch(e){return null;}}
async function fetchCSV(url){try{const res=await fetch(url+'&t='+Date.now());if(!res.ok)return{error:'HTTP '+res.status};const txt=await res.text();if(txt.trim().startsWith('<'))return{error:'HTML returned — check publish settings'};const parsed=parseCSV(txt);if(!parsed)return{error:'Empty or invalid CSV'};return{data:parsed};}catch(err){return{error:err.message};}}
// Special fetcher for sheets where row 0 is a description and row 1 holds actual column headers
async function fetchExtCSV(url){try{const res=await fetch(url+'&t='+Date.now());if(!res.ok)return{error:'HTTP '+res.status};const txt=await res.text();if(txt.trim().startsWith('<'))return{error:'HTML returned'};const lines=txt.trim().split('\n');if(lines.length<3)return{error:'Insufficient rows'};const hdrs=parseLine(lines[1]).map(h=>h.trim());const rows=lines.slice(2).map(l=>{const v=parseLine(l),o={};hdrs.forEach((h,i)=>{o[h]=v[i]||'';});return o;}).filter(r=>Object.values(r).some(v=>v!==''));return{data:{headers:hdrs,rows}};}catch(err){return{error:err.message};}}
// ── HELPERS ───────────────────────────────────────────────────────────────────
function gv(row,...keys){for(const k of keys)if(row&&row[k]!==undefined&&row[k]!=='')return row[k];return'';}
function num(v){return parseFloat(String(v).replace(/,/g,''))||0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function badge(text,cfg){const c=cfg[text]||{bg:'#1e3a5222',color:'#557',border:'#1e3a5244'};return text?`<span class="badge" style="background:${c.bg};color:${c.color};border:1px solid ${c.border}">${esc(text)}</span>`:'<span style="color:#334">—</span>';}
function acwrColor(v){if(!v||v===0)return'#557';if(v>1.5)return'#E24B4A';if(v>=1.3)return'#FF8C00';if(v>=0.8)return'#4CAF50';return'#4FC3F7';}
function sprintColor(p){return p>=90?'#4CAF50':p>=80?'#FF8C00':'#E24B4A';}
function accVolColor(v7,avg28){if(!avg28)return'#557';const r=v7/avg28;if(r>1.15)return'#E24B4A';if(r>=0.95)return'#4CAF50';if(r>=0.80)return'#FF8C00';return'#4FC3F7';}
function pkColor(p){return p>=90?'#4CAF50':p>=80?'#FF8C00':p>0?'#E24B4A':'#557';}
function pkFmt(v,unit,p){if(!v)return'<span style="color:#334">—</span>';const c=pkColor(p);return`<span style="font-weight:700;color:${c}">${v.toFixed(unit==='km/h'?1:2)}\u00a0${unit}</span>${p>0?`<span style="color:${c};font-size:9px">\u00a0(${p.toFixed(0)}%)</span>`:''}`;}

function fmtWeek(d){if(d===''||d==null)return'';const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const s=String(d).trim();if(/^\d{5,}(\.\d+)?$/.test(s)){const ms=(parseFloat(s)-25569)*86400000;const dt=new Date(ms);if(!isNaN(dt))return dt.getUTCDate()+' '+M[dt.getUTCMonth()];}const p=s.split(/[-\/]/);if(p.length===3){if(p[0].length===4)return parseInt(p[2])+' '+M[parseInt(p[1])-1];if(parseInt(p[0])>12)return parseInt(p[0])+' '+M[parseInt(p[1])-1];return parseInt(p[1])+' '+M[parseInt(p[0])-1];}return s;}
function dateToMs(d){if(!d)return 0;const s=String(d).trim();if(/^\d{5,}(\.\d+)?$/.test(s))return(parseFloat(s)-25569)*86400000;const p=s.split(/[-\/]/);if(p.length===3){if(p[0].length===4)return Date.UTC(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));if(parseInt(p[0])>12)return Date.UTC(2000+parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return Date.UTC(2000+parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));}return 0;}
function setupMsg(title,detail){return`<div class="setup-box"><div style="font-size:20px;margin-bottom:12px">📋</div><div style="font-size:13px;color:#9FE1CB;font-weight:600;margin-bottom:8px">${title}</div><div style="font-size:11px;color:#446;line-height:1.8;max-width:440px;margin:0 auto">${detail}</div></div>`;}
// ── SCATTER BASE ──────────────────────────────────────────────────────────────
function buildScatterBase(){
  const p=[];
  [70,80,90,100,110,120,130,140,150,160].forEach(x=>{p.push(`<line x1="${sx(x)}" x2="${sx(x)}" y1="${SPT}" y2="${SPT+SPH}" stroke="#0f2a3e" stroke-width="1"/>`);});
  [0,10,20,30,40].forEach(y=>{p.push(`<line x1="${SPL}" x2="${SPL+SPW}" y1="${sy(y)}" y2="${sy(y)}" stroke="#0f2a3e" stroke-width="1"/>`);});
  p.push(`<rect x="${sx(U20_M)}" y="${SPT}" width="${sx(XX)-sx(U20_M)}" height="${sy(U20_H)-SPT}" fill="#CC5500" fill-opacity="0.15"/>`);
  p.push(`<line x1="${sx(U20_M)}" x2="${sx(U20_M)}" y1="${SPT}" y2="${sy(U20_H)}" stroke="#FF8C00" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>`);
  p.push(`<line x1="${sx(U20_M)}" x2="${sx(XX)}" y1="${sy(U20_H)}" y2="${sy(U20_H)}" stroke="#FF8C00" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>`);
  p.push(`<rect x="${sx(SNR_M)}" y="${SPT}" width="${sx(XX)-sx(SNR_M)}" height="${sy(SNR_H)-SPT}" fill="#8B1A1A" fill-opacity="0.60"/>`);
  p.push(`<line x1="${sx(SNR_M)}" x2="${sx(SNR_M)}" y1="${SPT}" y2="${sy(SNR_H)}" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.9"/>`);
  p.push(`<line x1="${sx(SNR_M)}" x2="${sx(XX)}" y1="${sy(SNR_H)}" y2="${sy(SNR_H)}" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.9"/>`);
  p.push(`<text x="${sx(XX)-8}" y="${sy(SNR_H)-14}" text-anchor="end" font-size="9" fill="#E24B4A" font-weight="bold">SENIOR ZONE</text>`);
  p.push(`<text x="${sx(XX)-8}" y="${sy(SNR_H)-4}" text-anchor="end" font-size="8" fill="#E24B4A" opacity="0.7">${SNR_M} M/Min · ${SNR_H} HMLD/Min</text>`);
  p.push(`<text x="${sx(SNR_M)-8}" y="${sy(U20_H)-14}" text-anchor="end" font-size="9" fill="#FF8C00" font-weight="bold">U20 ZONE</text>`);
  p.push(`<text x="${sx(SNR_M)-8}" y="${sy(U20_H)-4}" text-anchor="end" font-size="8" fill="#FF8C00" opacity="0.7">${U20_M} M/Min · ${U20_H} HMLD/Min</text>`);
  p.push(`<line x1="${SPL}" x2="${SPL+SPW}" y1="${SPT+SPH}" y2="${SPT+SPH}" stroke="#1e3a52" stroke-width="1"/>`);
  p.push(`<line x1="${SPL}" x2="${SPL}" y1="${SPT}" y2="${SPT+SPH}" stroke="#1e3a52" stroke-width="1"/>`);
  [70,80,90,100,110,120,130,140,150,160].forEach(x=>{p.push(`<text x="${sx(x)}" y="${SPT+SPH+16}" text-anchor="middle" font-size="9" fill="#446">${x}</text>`);});
  p.push(`<text x="${SPL+SPW/2}" y="${SCH-4}" text-anchor="middle" font-size="10" fill="#557">Distance Per Minute (M/Min)</text>`);
  [0,10,20,30,40].forEach(y=>{p.push(`<text x="${SPL-6}" y="${sy(y)+4}" text-anchor="end" font-size="9" fill="#446">${y}</text>`);});
  p.push(`<text transform="translate(13,${SPT+SPH/2}) rotate(-90)" text-anchor="middle" font-size="10" fill="#557">HMLD Per Minute</text>`);
  return p;
}
function scatterSVG(parts,tipId='dot-tooltip'){
  return`<div style="position:relative"><svg id="intensity-svg" viewBox="0 0 ${SCW} ${SCH}" width="100%" height="${SCH}" style="background:#0c1f32;border-radius:8px;display:block">${parts.join('')}</svg><div id="${tipId}" style="display:none;position:absolute;background:#0f2235;border:1px solid #1e3a52;border-radius:5px;padding:8px 12px;font-size:11px;pointer-events:none;min-width:180px;z-index:10"></div></div>`;
}
function scatterLegendBar(n,disp){
  const iu20=disp.filter(p=>p.x>=U20_M&&p.y>=U20_H).length,isnr=disp.filter(p=>p.x>=SNR_M&&p.y>=SNR_H).length;
  return`<div style="display:flex;gap:18px;align-items:center;margin-top:8px;flex-wrap:wrap;font-size:9px">
    <div style="display:flex;gap:5px;align-items:center"><div style="width:11px;height:11px;background:#8B1A1A;border:1.5px dashed #E24B4A;border-radius:2px"></div><span style="color:#E24B4A;font-weight:700">Senior Zone</span><span style="color:#446">${isnr}/${n}</span></div>
    <div style="display:flex;gap:5px;align-items:center"><div style="width:11px;height:11px;background:#CC5500;border:1.5px dashed #FF8C00;border-radius:2px"></div><span style="color:#FF8C00;font-weight:700">U20 Zone</span><span style="color:#446">${iu20}/${n}</span></div>
    ${Object.entries(PCOL).map(([p,c])=>`<div style="display:flex;gap:5px;align-items:center"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span style="color:${c}">${p}</span></div>`).join('')}
  </div>`;
}
function addZone(pts){return pts.map(p=>({...p,zone:p.x>=SNR_M&&p.y>=SNR_H?'Senior Zone':p.x>=U20_M&&p.y>=U20_H?'U20 Zone':'Below Zone'}));}
// ── SCATTER DOT RENDER (shared, highlight support) ────────────────────────────
function dotsSVG(disp,highlightName){
  return disp.map(p=>{
    const cx=sx(p.x),cy=sy(p.y),col=PCOL[p.pos]||'#aaa';
    const isHL=highlightName&&p.full===highlightName;
    const r=isHL?8:5,sw=isHL?2:1,stroke=isHL?'#fff':'#0c1f32';
    const tip=esc(`${p.full} | ${p.pos||'—'} | ${p.x} M/Min · ${p.y} HMLD/Min | ${p.zone||''}${p.match?' | '+p.match:''}`);
    return`<g class="dot" data-tip="${tip}">${isHL?`<circle cx="${cx}" cy="${cy}" r="12" fill="none" stroke="${col}" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>`:''}
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" fill-opacity="${isHL?1:0.85}" stroke="${stroke}" stroke-width="${sw}"/>

// ── MULTI-METRIC PEAK CHART (Load Monitoring: Max Speed / Max Acc / Max Dec) ───

    parts.push(`<line x1="${PL}" x2="${PL+PW}" y1="${yOff+BH}" y2="${yOff+BH}" stroke="#0f2a3e" stroke-width="1"/>`);
    sessions.forEach((r,i)=>{
      const v=r[s.key];if(!v)return;
      const bh=(v/maxV)*BH;
      const isMatch=r.stype.toLowerCase().includes('match');
      const col=isMatch?'#FF8C00':s.color;
      const tip=`${fmtWeek(r.date)} | ${s.label}: ${v.toFixed(2)} ${s.unit}${isMatch?' [Match]':''}`;
      parts.push(`<g class="trend-dot" data-tip="${esc(tip)}"><rect x="${bx(i)}" y="${yOff+BH-bh}" width="${bw}" height="${bh}" fill="${col}" fill-opacity="0.8" rx="2"/></g>`);
    });
  });
  // X-axis dates
  if(n<=18)sessions.forEach((r,i)=>{const xc=bx(i)+bw/2,y=PT+series.length*(BH+GAP)+16;parts.push(`<text x="${xc}" y="${y}" text-anchor="middle" font-size="7.5" fill="#334" transform="rotate(-40,${xc},${y})">${fmtWeek(r.date)}</text>`);});
  parts.push(`<line x1="${PL}" x2="${PL}" y1="${PT}" y2="${PT+series.length*(BH+GAP)}" stroke="#1e3a52" stroke-width="1"/>`);
  return`<div style="margin-top:14px"><div style="font-size:9px;color:#557;text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px">Session Peaks — Max Speed · Max Acc · Max Dec · <span style="color:#FF8C00">■ Match</span> · Hover for values</div><div style="position:relative"><svg id="peak-svg" viewBox="0 0 ${W} ${totalH}" width="100%" height="${totalH}" style="background:#0c1f32;border-radius:8px;display:block">${parts.join('')}</svg><div id="peak-tooltip" style="display:none;position:absolute;background:#0f2235;border:1px solid #1e3a52;border-radius:5px;padding:6px 10px;font-size:11px;pointer-events:none;min-width:160px;z-index:10"></div></div>${peakDebug}</div>`;
}
// ── GET TREND WEEKS ───────────────────────────────────────────────────────────
function getTrendWeeks(playerName,metric,maxWeeks){
  const m=METRICS[metric||'hmld'];
  if(!DATA.trend||DATA.trend.error)return null;
  const rows=DATA.trend.data.rows;
  let result;
  if(playerName&&playerName!=='All'){
    result=rows.filter(r=>gv(r,'Player_Name')===playerName).map(r=>({week:gv(r,'Week_Start','Week Start'),val:num(gv(r,...m.weekCols)),acwr:num(gv(r,...m.acwrCols)),sessions:num(gv(r,'Sessions'))})).filter(r=>r.week).sort((a,b)=>dateToMs(a.week)-dateToMs(b.week));
  } else {
    const byWeek={};
    rows.forEach(r=>{const w=gv(r,'Week_Start','Week Start');if(!w)return;if(!byWeek[w])byWeek[w]={val:[],acwr:[],sessions:[]};byWeek[w].val.push(num(gv(r,...m.weekCols)));byWeek[w].acwr.push(num(gv(r,...m.acwrCols)));byWeek[w].sessions.push(num(gv(r,'Sessions')));});
    result=Object.entries(byWeek).map(([week,v])=>({week,val:+(v.val.reduce((s,x)=>s+x,0)/v.val.length).toFixed(0),acwr:+(v.acwr.filter(x=>x>0).reduce((s,x)=>s+x,0)/(v.acwr.filter(x=>x>0).length||1)).toFixed(2),sessions:+(v.sessions.reduce((s,x)=>s+x,0)/v.sessions.length).toFixed(1)})).sort((a,b)=>dateToMs(a.week)-dateToMs(b.week));
  }
  if(maxWeeks)result=result.slice(-maxWeeks);else result=result.slice(-12);
  return result;
}
// ── LATEST HMLD ACWR (LS_Load_Trend: most recent week per player) ─────────────
function buildLatestAcwr(){
  const map={};
  if(!DATA.trend||DATA.trend.error)return map;
  DATA.trend.data.rows.forEach(r=>{
    const pn=gv(r,'Player_Name');if(!pn)return;
    const dt=dateToMs(gv(r,'Week_Start','Week Start'));
    const acwr=num(gv(r,'HMLD_ACWR','HMLD ACWR'));
    if(acwr>0&&(!map[pn]||dt>map[pn].dt))map[pn]={acwr,dt};
  });
  return map;
}
// ── PLAYER PEAKS (LS_Daily_Export: latest session + 28d rolling peak) ─────────
function buildPlayerPeaks(){
  const map={};
  if(!DATA.daily||DATA.daily.error)return map;
  const now=Date.now(),d28=28*86400000;
  DATA.daily.data.rows.forEach(r=>{
    const pn=gv(r,'Player_Name');if(!pn)return;
    const dt=dateToMs(gv(r,'Date'));
    const spd=num(gv(r,...SPD_COLS));
    const acc=num(gv(r,'Max_Acc',...ACC_COLS));
    const dec=num(gv(r,'Max_Dec',...DEC_COLS));
    if(!map[pn])map[pn]={rows:[]};
    map[pn].rows.push({dt,spd,acc,dec});
  });
  Object.keys(map).forEach(pn=>{
    const rows=map[pn].rows.sort((a,b)=>b.dt-a.dt);
    const latest=rows[0]||{};
    const r28=rows.filter(r=>r.dt>=now-d28);
    const pk=(arr,k)=>Math.max(...arr.map(r=>r[k]).filter(v=>v>0),0)||0;
    map[pn]={spd:latest.spd||0,acc:latest.acc||0,dec:latest.dec||0,
              spd28:pk(r28,'spd'),acc28:pk(r28,'acc'),dec28:pk(r28,'dec'),
              latestDt:rows[0]?rows[0].dt:0};
  });
  return map;
}
// ── EXTERNAL ACTIVITY HELPERS ─────────────────────────────────────────────────
function parseExtActDate(ts){
  if(!ts)return 0;
  const s=String(ts).trim();
  // DD/MM/YYYY HH:MM:SS (Google Forms timestamp)
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return Date.UTC(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  return dateToMs(s);
}
function parseDuration(s){
  if(!s)return 0;
  s=String(s).trim();
  const hm=s.match(/(\d+\.?\d*)\s*hour/i);
  if(hm)return Math.round(parseFloat(hm[1])*60);
  const nums=s.match(/\d+/g);
  return nums?parseInt(nums[0]):0;
}
function parseExtSheetDate(s){
  // Handles "Tue, 17, Mar" / "Sat, 28, Mar" format from External Activity sheet
  if(!s)return 0;
  s=String(s).trim();
  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parts=s.split(',').map(p=>p.trim());
  if(parts.length>=3){
    const day=parseInt(parts[1]);
    const mon=MONTHS[parts[2]];
    if(!isNaN(day)&&mon!==undefined)return Date.UTC(2026,mon,day);
  }
  return parseExtActDate(s); // fallback to DD/MM/YYYY HH:MM:SS parser
}
function buildPlayerRates(){
  // Compute avg HMLD / TD / HSR per player per session type (match vs training)
  // Used to estimate load from external activity duration
  const map={};
  if(!DATA.daily||DATA.daily.error)return map;
  DATA.daily.data.rows.forEach(r=>{
    const pn=(gv(r,'Player_Name')||'').trim();if(!pn)return;
    const stype=(gv(r,'Session_Type','Session_Label')||'').toLowerCase();
    const isMatch=/match|game/.test(stype);
    const hmld=num(gv(r,'HMLD'));
    const td=num(gv(r,'Total_Distance'));
    const hsr=num(gv(r,'HSR'));
    if(!map[pn])map[pn]={m:{hmld:[],td:[],hsr:[]},t:{hmld:[],td:[],hsr:[]}};
    const b=isMatch?'m':'t';
    if(hmld>0)map[pn][b].hmld.push(hmld);
    if(td>0)map[pn][b].td.push(td);
    if(hsr>0)map[pn][b].hsr.push(hsr);
  });
  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;
  Object.keys(map).forEach(pn=>{
    const d=map[pn];
    map[pn]={
      m:{hmld:avg(d.m.hmld),td:avg(d.m.td),hsr:avg(d.m.hsr),n:d.m.hmld.length},
      t:{hmld:avg(d.t.hmld),td:avg(d.t.td),hsr:avg(d.t.hsr),n:d.t.hmld.length}
    };
  });
  return map;
}
function getPlayerExtActs(name,windowMs){
  if(!DATA.ext||DATA.ext.error)return[];
  const nm=(name||'').trim().toLowerCase();
  const cutoff=Date.now()-windowMs;
  return DATA.ext.data.rows
    .filter(r=>{
      // Column is "Player" in structured sheet, "Name" in form responses
      const pn=(gv(r,'Player')||gv(r,'Name')||'').trim().toLowerCase();
      return pn===nm;
    })
    .map(r=>{
      const actRaw=(gv(r,'Activity type')||gv(r,'Activity')||gv(r,'Activity ')||'').trim();
      const dateRaw=gv(r,'Date')||gv(r,'Timestamp')||'';
      const durRaw=gv(r,'Duration (min)')||gv(r,'Duration (minutes)')||gv(r,'Duration')||'';
      return{
        ts:parseExtSheetDate(dateRaw)||parseExtActDate(dateRaw),
        act:actRaw,
        dur:parseDuration(durRaw),
        rpe:num(gv(r,'RPE')||gv(r,'Rate of Perceived Effort (RPE)')||''),
        isMatch:/match|game|\bvs\b|\bv\s/i.test(actRaw)
      };
    })
    .filter(e=>e.ts>=cutoff&&e.dur>0)
    .sort((a,b)=>b.ts-a.ts);
}
// ── RENDER: SQUAD STATUS ───────────────────────────────────────────────────────
function renderSquad(){
  const d=DATA.squad;
  if(!d||d.error)return`<div style="padding:20px;color:#E24B4A">⚠ ${d?d.error:'No data loaded'}</div>`;

  const peaks=buildPlayerPeaks();
  const latestAcwr=buildLatestAcwr();

  const acwrVals=players.map(r=>{const n=gv(r,'Player Name','Player_Name');return(latestAcwr[n]||{}).acwr||0;}).filter(v=>v>0);
  const allSame=acwrVals.length>2&&acwrVals.every(v=>Math.abs(v-acwrVals[0])<0.01);

  const avail=players.filter(r=>gv(r,'Availability')==='Available').length;

  const flagged=players.filter(r=>['High Risk','Monitor'].includes(gv(r,'Load Flag','Load_Flag'))).length;
  // Stale status: Injured / RTP / No GPS but GPS session data present in last 7 days
  const d7ms=7*86400000,nowMs=Date.now();
  const isStaleStatus=r=>{
    const av=gv(r,'Availability')||'';
    const isRestricted=av==='Injured'||/rtp|return/i.test(av)||av==='No GPS';
    if(!isRestricted)return false;
    const nm=gv(r,'Player Name','Player_Name');
    const latestDt=(peaks[nm]||{}).latestDt||0;
    return latestDt>0&&(nowMs-latestDt)<=d7ms;
  };
  const staleRows=players.filter(isStaleStatus);
  const staleCount=staleRows.length;
  const staleWarn=staleCount>0?`<div style="background:#E24B4A18;border:1px solid #E24B4A44;border-radius:6px;padding:10px 16px;margin-bottom:12px;font-size:10px;color:#E24B4A;display:flex;gap:12px;align-items:flex-start"><span style="font-size:14px;line-height:1">⚠</span><div><strong>${staleCount} player${staleCount>1?'s':''} with stale status flag</strong> — marked Injured / RTP / No GPS but GPS data present in last 7 days. Review and update Availability in the workbook.<br><span style="color:#FF8C00;margin-top:4px;display:inline-block">${staleRows.map(r=>gv(r,'Player Name','Player_Name')).join(' · ')}</span></div></div>`:'';
  let filtered=STATE.squadPos==='All'?players:players.filter(r=>gv(r,'Position Group','Position_Group')===STATE.squadPos);
  filtered=[...filtered].sort((a,b)=>{
    if(STATE.squadSort==='hmld'){const aA=(latestAcwr[gv(a,'Player Name','Player_Name')]||{}).acwr||0,bA=(latestAcwr[gv(b,'Player Name','Player_Name')]||{}).acwr||0;return STATE.squadDir==='desc'?bA-aA:aA-bA;}
    return STATE.squadDir==='desc'?num(gv(b,'Sessions Last 7 Days','Sessions_Last_7_Days'))-num(gv(a,'Sessions Last 7 Days','Sessions_Last_7_Days')):num(gv(a,'Sessions Last 7 Days','Sessions_Last_7_Days'))-num(gv(b,'Sessions Last 7 Days','Sessions_Last_7_Days'));
  });
  const th=(col,lbl,tip)=>`<th data-sort="${col}"${tip?` title="${tip}"`:''}>${lbl}${STATE.squadSort===col?(STATE.squadDir==='desc'?' ↓':' ↑'):''}</th>`;
  const rows_html=filtered.map(r=>{
    const name=gv(r,'Player Name','Player_Name')||'—';
    const pos=gv(r,'Position Group','Position_Group')||'—';
    const av=gv(r,'Availability')||'Available';
    const inj=gv(r,'Injury Status','Injury_Status')||'';
    const flag=gv(r,'Load Flag','Load_Flag')||'Normal';
    // HMLD ACWR — bypass LS_Squad_Load, read latest week from LS_Load_Trend
    const ha=(latestAcwr[name]||{}).acwr||0;
    // External activity — LS_Squad_Load flags (fallback)
    const extFlag=gv(r,'External_Fixture_Flag','External Fixture Flag','External_Activity','External Activity');
    const extDate=gv(r,'External_Fixture_Date','External Fixture Date');
    const hasExtSL=(num(extFlag)>0)||(extFlag&&extFlag!=='0'&&extFlag!=='');
    const extDateMs=extDate?dateToMs(extDate):0;
    const extIn7dSL=extDateMs>0&&(Date.now()-extDateMs)<=7*86400000;
    // External Activity sheet — richer data: duration, RPE, match vs training
    const extActs7d=getPlayerExtActs(name,7*86400000);
    const hasExtForm=extActs7d.length>0;
    const hasExt=hasExtSL||hasExtForm;
    const extIn7d=extIn7dSL||hasExtForm;
    // External session count to add to GPS sess total
    const extSessCount=hasExtForm?extActs7d.length:(hasExtSL&&extIn7dSL?1:0);
    // Estimated load from external activity (player avg per session × duration ratio)

    const spdPct=spd28>0?(mspd/spd28*100):0;
    const accMsPct=acc28p>0?(macc/acc28p*100):0;
    const decMsPct=dec28p>0?(mdec/dec28p*100):0;
    const velFmt=pkFmt(mspd,'m/s',spdPct);

    // Days since match — override with external match date if more recent

    else if(ha>0&&ha<0.8){action='Increase volume ↑';ac2='#4FC3F7';}

  return`<div>

function getMatchesSorted(allRows){
  // Returns match labels sorted chronologically using Date column if available

}
function filterLastN(allPts,allRows,n){

function renderMatch(){
  const d=DATA.squad;
  if(!d||d.error)return`<div style="padding:20px;color:#E24B4A">⚠ ${d?d.error:'No squad data'}</div>`;
  let players=d.data.rows.filter(r=>gv(r,'Player Name','Player_Name'));

  const intensityRows=DATA.intensity&&!DATA.intensity.error?DATA.intensity.data.rows:[];
  const matchLabels=[...new Set(intensityRows.map(r=>gv(r,'Match_Label')).filter(Boolean))];
  const totalMatches=matchLabels.length||1;
  const avgRep=players.length?players.reduce((s,r)=>{const nm=gv(r,'Player Name','Player_Name');const pm=intensityRows.filter(ir=>gv(ir,'Player_Name','Player Name')===nm).length;return s+(pm/totalMatches*100);},0)/players.length:0;

      <table><thead><tr><th>Player</th><th>Position</th><th>Status</th><th>Matches Played</th><th>Rep % (GPS only)</th><th>Last Match Mins</th><th>Days Since Match</th><th>External Activity</th></tr></thead>
      <tbody>${rows_html||'<tr><td colspan="8" style="text-align:center;color:#334;padding:30px">No players match filter.</td></tr>'}</tbody></table>

  document.querySelectorAll('#match-pos-filter .pos-btn').forEach(btn=>{btn.onclick=()=>{STATE.matchPos=btn.dataset.pos;render();};});

  const pp=document.getElementById('profile-player-sel');if(pp)pp.onchange=()=>{STATE.profilePlayer=pp.value;render();};
  document.querySelectorAll('[data-tl]').forEach(btn=>{btn.onclick=()=>{STATE.profileTimeline=btn.dataset.tl;render();};});

  document.querySelectorAll('[data-pmode]').forEach(btn=>{btn.onclick=()=>{STATE.profMode=btn.dataset.pmode;render();};});
  document.querySelectorAll('[data-phalf]').forEach(btn=>{btn.onclick=()=>{STATE.profHalf=btn.dataset.phalf;render();};});
  const pm=document.getElementById('prof-match-sel');if(pm)pm.onchange=()=>{STATE.profMatch=pm.value;render();};
  // SVG tooltips
  function bindTip(svgId,tipId){
    const svg=document.getElementById(svgId),tip=document.getElementById(tipId);
    if(!svg||!tip)return;
    svg.querySelectorAll('.dot,.trend-dot').forEach(dot=>{
      dot.onmouseenter=()=>{
        const t=dot.dataset.tip;if(!t)return;
        tip.innerHTML=t.split(' | ').map((line,i)=>`<div style="${i===0?'font-weight:bold':'font-size:10px;color:#9FE1CB;margin-top:2px'}">${esc(line)}</div>`).join('');
        const sr=svg.getBoundingClientRect();
        const er=(dot.querySelector('circle')||dot.querySelector('rect')||dot).getBoundingClientRect?.()??sr;
        tip.style.display='block';tip.style.left=(er.left-sr.left+12)+'px';tip.style.top=Math.max(0,er.top-sr.top-50)+'px';
      };
      dot.onmouseleave=()=>{tip.style.display='none';};
    });
  }
  bindTip('intensity-svg','dot-tooltip');
  bindTip('weekly-svg','weekly-tooltip');
  bindTip('daily-svg','daily-tooltip');
  bindTip('peak-svg','peak-tooltip');
}
// ── NEXT MATCH AUTO-DETECT ─────────────────────────────────────────────────────
function parseScheduleDate(s){
  if(!s)return null;
  // Try direct parse first
  let d=new Date(s);if(!isNaN(d.getTime()))return d;
  // Handle "Wed, 29, Apr" / "Wed,  29, Apr" format
  const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const parts=s.replace(/,/g,' ').trim().split(/\s+/);
  let day=null,mon=null;
  for(const p of parts){const n=parseInt(p);if(!isNaN(n)&&n>=1&&n<=31)day=n;const m=MONTHS[p.toLowerCase().substring(0,3)];if(m!==undefined)mon=m;}
  if(day!==null&&mon!==null){
    const now=new Date();let yr=now.getFullYear();
    const cand=new Date(yr,mon,day);
    if(cand<now&&(now-cand)>180*86400000)yr++;
    return new Date(yr,mon,day);
  }
  return null;
}
function buildNextMatch(rows){
  if(!rows||!rows.length)return null;
  const sample=rows[0];
  const dateCol=['Match date','Match Date','Date','date','Match_Date','Fixture_Date','Fixture Date'].find(c=>sample[c]!==undefined);
  const oppCol=['Opposition','Opponent','Team','Vs','vs','Match'].find(c=>sample[c]!==undefined);
  const roundCol=['Competition','Round','Stage','Type','Competition_Round','Fixture_Type'].find(c=>sample[c]!==undefined);
  if(!dateCol)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=rows.filter(r=>{const d=parseScheduleDate(gv(r,dateCol));return d&&d>=today;})
    .sort((a,b)=>parseScheduleDate(gv(a,dateCol))-parseScheduleDate(gv(b,dateCol)));
  if(!upcoming.length)return null;
  const next=upcoming[0];
  const d=parseScheduleDate(gv(next,dateCol));
  const dateStr=d.toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'});
  const opp=oppCol?gv(next,oppCol):'';
  const rnd=roundCol?gv(next,roundCol):'';
  const parts=[];
  if(opp)parts.push('v '+opp);
  if(rnd)parts.push(rnd);
  parts.push(dateStr);
  return parts.join(' — ');
}
// ── DATA LOAD ──────────────────────────────────────────────────────────────────
function dsStatus(id,result,label){
  const el=document.getElementById(id);if(!el)return;
  if(!result||result.error)el.innerHTML=`<span style="color:#E24B4A">✗ ${label}: ${result?esc(result.error):'no response'}</span>`;
  else el.innerHTML=`<span style="color:#4CAF50">✓ ${label} (${result.data.rows.length} rows)</span>`;
}
async function loadAll(){
  document.getElementById('tab-content').innerHTML='<div style="color:#9FE1CB;padding:40px 0;text-align:center"><span class="spinner"></span>Loading…</div>';
  const [sq,int,dr,tr,dy,ex,sc]=await Promise.all([fetchCSV(CFG.SQUAD_LOAD_URL),fetchCSV(CFG.PLAYER_INTENSITY_URL),fetchCSV(CFG.DRILL_DATA_URL),fetchCSV(CFG.LOAD_TREND_URL),fetchCSV(CFG.DAILY_URL),fetchExtCSV(CFG.EXT_ACTIVITY_URL),fetchExtCSV(CFG.MATCH_SCHEDULE_URL)]);
  DATA.squad=sq;DATA.intensity=int;DATA.drill=dr;DATA.trend=tr;DATA.daily=dy;DATA.ext=ex;DATA.schedule=sc;
  dsStatus('ds-squad',sq,'LS_Squad_Load');
  dsStatus('ds-intensity',int,'LS_Player_Intensity');
  dsStatus('ds-drill',dr,'LS_Drill_Data');
  dsStatus('ds-trend',tr,'LS_Load_Trend');
  dsStatus('ds-daily',dy,'LS_Daily_Export');
  dsStatus('ds-ext',ex,'Ext Activity');
  if(sc&&!sc.error){
    const nm=buildNextMatch(sc.data.rows);
    const scEl=document.getElementById('ds-schedule');
    if(nm){
      CFG.NEXT_MATCH=nm;
      document.getElementById('next-match').textContent=nm;
      if(scEl)scEl.innerHTML=`<span style="color:#4CAF50">✓ Schedule → ${esc(nm)}</span>`;
    } else {
      const firstRow=sc.data.rows[0]||{};
      const cols=Object.keys(firstRow).slice(0,4).join(' | ');
      const firstDate=firstRow[Object.keys(firstRow)[0]]||'?';
      if(scEl)scEl.innerHTML=`<span style="color:#FF8C00">⚠ Schedule (${sc.data.rows.length}r) no upcoming — cols: [${esc(cols)}] sample date: "${esc(firstDate)}"</span>`;
    }
  } else {
    const el=document.getElementById('ds-schedule');
    if(el)el.innerHTML=`<span style="color:#E24B4A">✗ Match Schedule: ${sc?sc.error:'no response'}</span>`;
  }
  if([sq,int].every(r=>!r||r.error)){
    const errs=[sq,int,dr,tr,dy].map((r,i)=>(['Squad','Intensity','Drill','Trend','Daily'][i]+': '+(r?r.error:'none'))).join('<br>');
    document.getElementById('tab-content').innerHTML=`<div style="background:#E24B4A18;border:1px solid #E24B4A44;border-radius:8px;padding:24px 28px;max-width:600px;margin:24px auto"><div style="font-size:14px;color:#E24B4A;font-weight:700;margin-bottom:10px">⚠ All data fetches failed</div><div style="font-size:11px;color:#FF8C00;line-height:1.9;font-family:monospace">${errs}</div><div style="margin-top:14px;font-size:11px;color:#446;line-height:1.7">Possible causes: file:// URL (deploy to Netlify) · Sheet not published · Network offline</div><button onclick="loadAll()" style="margin-top:14px;padding:6px 16px;border-radius:4px;border:1px solid #9FE1CB;background:transparent;color:#9FE1CB;font-size:11px">↻ Retry</button></div>`;
    return;
  }
  render();
}
document.getElementById('team-name').textContent=CFG.TEAM;
document.getElementById('next-match').textContent=CFG.NEXT_MATCH;
loadAll();
</script>
